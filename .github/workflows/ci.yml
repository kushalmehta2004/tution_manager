name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace @tuition-manager/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tuition_manager_ci
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/tuition_manager_ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck